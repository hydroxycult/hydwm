backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;
vsync = true;
use-damage = true;  
fading = true;
fade-in-step = 0.028;      
fade-out-step = 0.028;    
fade-delta = 3;            
no-fading-openclose = false;
no-fading-destroyed-argb = true;
fade-exclude = [
  "class_g = 'slop'"   # maim
];

# Window animation settings (if using picom-jonaburg or picom-animations fork)
animations = true;
animation-stiffness = 200;      
animation-window-mass = 0.5;    
animation-dampening = 20;       
animation-clamping = false;    
animation-for-open-window = "zoom";         
animation-for-unmap-window = "zoom";        
animation-for-menu-window = "slide-down";   
animation-for-transient-window = "slide-down";

# If standard picom, these won't break it, they'll just be ignored


active-opacity = 1.0;
inactive-opacity = 0.92;      
frame-opacity = 1.0;
inactive-opacity-override = false;
inactive-dim = 0.08;          
focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'Bar'",
  "class_g = 'slop'"
];
opacity-rule = [
  "100:class_g = 'slop'",
  "100:class_g = 'XTerm'",
  "100:class_g = 'URxvt'",
  "100:class_g = 'kitty'",
  "100:class_g = 'Alacritty'",
  "100:class_g = 'Polybar'",
  "100:class_g = 'code-oss'",
  "100:class_g = 'Meld'",
  "100:class_g = 'firefox'",
  "100:class_g = 'Thunderbird'",
  "100:class_g = 'mpv'",
  "100:class_g = 'Gimp'",
  "95:class_g = 'Rofi'",       
  "90:class_g = 'Dunst'",     
];

blur: {
  method = "dual_kawase";
  strength = 6;               
  background = false;
  background-frame = false;
  background-fixed = false;
}

blur-background = true;
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "name = 'cavatransparent'",
  "class_g = 'Plank'",
  "class_g = 'slop'",
  "class_g = 'Gis-weather.py'",
  "_GTK_FRAME_EXTENTS@:c",
  "class_g = 'Firefox' && argb"  
];
corner-radius = 0;            
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g ?= 'tint2'",
  "class_g ?= 'Polybar'"
];

round-borders = 1;
round-borders-exclude = [];
round-borders-rule = [
  "2:class_g ?= 'firefox'",
  "2:class_g ?= 'Alacritty'",
  "2:class_g ?= 'kitty'"
];

shadow = true;
shadow-radius = 20;           
shadow-opacity = 0.40;        
shadow-offset-x = -15;
shadow-offset-y = -15;
shadow-color = "#000000";

shadow-exclude = [
  "name = 'Notification'",
  "name = 'Plank'",
  "name = 'Docky'",
  "name = 'Kupfer'",
  "name = 'xfce4-notifyd'",
  "name *= 'VLC'",
  "name *= 'Chromium'",
  "name *= 'Chrome'",
  "name *= 'cavatransparent'",
  "class_g = 'Conky'",
  "class_g = 'Tint2'",
  "class_g = 'slop'",
  "class_g ?= 'Xfce4-notifyd'",
  "class_g ?= 'Xfce4-power-manager'",
  "_GTK_FRAME_EXTENTS@:c",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
daemon = false;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0;
use-ewmh-active-win = true;
detect-transient = true;
detect-client-leader = true;

# perf optimisations
unredir-if-possible = false;   
glx-no-rebind-pixmap = true;   

log-level = "warn";
wintypes:
{
  tooltip = { 
    fade = true; 
    shadow = true; 
    opacity = 0.95; 
    focus = true; 
    full-shadow = false; 
  };
  dock = { 
    shadow = false; 
    clip-shadow-above = true; 
  };
  dnd = { 
    shadow = false; 
  };
  popup_menu = { 
    opacity = 0.95;
    fade = true;
    shadow = true;
  };
  dropdown_menu = { 
    opacity = 0.95;
    fade = true;
    shadow = true;
  };
  utility = { 
    shadow = true; 
    opacity = 1.0; 
  };
  notification = {
    fade = true;
    shadow = true;
    opacity = 0.90;
  };
};
